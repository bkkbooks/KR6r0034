body:
  text: 阿育王太子法益壞目因緣經序原夫善惡之運契猶形影之相須受對明驗凡三差焉現也中也後也播九色之深恩以悅天妃之耳目孤禽投王而全命形受五兀之切酷斯現報也群徒潛淪於幽壑神陟輪飄而不改身酸歷世之殃釁不曉王子之喪目斯中報也阿蘭縱禍於無想嬰佩永惑於始終為著翅之暴狸飛沈受困而難計斯後報也故聖人降靈必有所由非務不豫青白明矣玄鑒三世弱喪之流深記來變壞形之纍趣使引入百練之室自如來逝後阿育登位綱維閻浮光被流洽圖形神寺八萬四千羅漢御世泛濟億數國主師宗玄化滂涌萬民仰戴而不已神祇欽賴而愈深然王子法益宿殖洪業生在王宮容貌殊特後復受對靡知緣起會秦尚書令公輔國將軍宗正卿領城門校尉使者司隸校尉姚旻者南安郡人也親姚詔之次兄字景嶷文為儒表則列勳於千載武為邈群則皎然而獨標亢音通冥則辨機而曠遠執素縱情則翱翔而無論德也純懿範也難摸赫逸翰於群才振龍威於昆鋒然愍永惑之叵救傷愚黨之不寤欲紹先勝之遺迹竪玄宗於末俗故請天竺沙門曇摩難提出斯緣本秦建初六年歲在辛卯於安定城二月十八日出至二十五日乃訖梵本三百四十三首盧冶傳為漢文一萬八百八十言念譯晉音情義實難或離文而就義或正滯而傍通或取解於誦人或事略而曲備冀將來之學士令鑒罪福之不朽設有毫釐潤色者盡銘之於萌兆故敘之焉
