  - {type: variant, offset: 256, length: 128, content: 秦尚書令〔公〕－【三】公【大】，〔－〕【宋】【元】【明】公輔國將軍宗正卿。領城門校尉使者司隷校尉姚旻者。南安郡＝群【宋】【元】郡【大】，群【宋】【元】郡群人也。親姚詔＝韶【三】詔【大】，韶【宋】【元】【明】詔韶之次兄字景嶷。文＝又【宋】【元】文【大】，又【宋】【元】文又為儒表。則列＝烈【三】列【大】，烈【宋】【元】【明】列烈勳＝動【宋】【元】勳【大】，動【宋】【元】勳動於千載。武為邈群。則皎然而獨標。亢＝凡【宋】【元】亢【大】，凡【宋】【元】亢凡音通冥＝實【三】冥【大】，實【宋】【元】【明】冥實。則辯機而曠遠。執素縱情。則翱翔而無論＝倫【三】論【大】，倫【宋】【元】【明】論倫德也純懿。範也難摸。恭＝赫【三】赫【CB】【思溪-CB】【宋】【元】【明】，恭【大】赫《思溪藏》（中國國家圖書館藏第4181冊第4圖第9行）恭赫逸翰於群才。振龍威於昆鋒。然愍永惑之叵救。傷愚黨之不寤。欲紹先勝之遺迹。竪玄宗於末俗。故請, 宮: ''}
